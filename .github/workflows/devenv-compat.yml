name: Upgrade Compatibility Test

on:
  workflow_call:
    inputs:
      buildcmd:
        description: "Build command to run"
        required: true
        type: string
      envcmd:
        description: "Environment setup command to run"
        required: true
        type: string
      testcmd:
        description: "Test command to run"
        required: true
        type: string
      nodes:
        description: "Number of nodes for the test"
        required: false
        default: "3"
        type: string
      node-name-template:
        description: "Template for the node name"
        required: false
        default: "don-node%d"
        type: string
      versions-back:
        description: "Number of versions to go back for compatibility testing"
        required: false
        default: "2"
        type: string
      working-directory:
        description: "Working directory for commands"
        required: false
        default: "devenv"
        type: string
      logs-directory:
        description: "Logs directory"
        required: true
        type: string
      ctf-log-level:
        description: "CTF log level"
        required: false
        default: "info"
        type: string

  workflow_dispatch:
    inputs:
      strip-image-suffix:
        description: "Strip image suffix from tag so it matches the registry tag"
        required: false
        type: string
      buildcmd:
        description: "Build command to run"
        required: true
        type: string
      envcmd:
        description: "Environment setup command to run"
        required: true
        type: string
      testcmd:
        description: "Test command to run"
        required: true
        type: string
      nodes:
        description: "Number of nodes for the test"
        required: false
        default: "3"
        type: string
      node-name-template:
        description: "Template for the node name"
        required: false
        default: "don-node%d"
        type: string
      versions-back:
        description: "Number of versions to go back for compatibility testing"
        required: false
        default: "2"
        type: string
      working-directory:
        description: "Working directory for commands"
        required: false
        default: "devenv"
        type: string
      logs-directory:
        description: "Logs directory"
        required: true
        type: string
      ctf-log-level:
        description: "CTF log level"
        required: false
        default: "info"
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.sha }}
  cancel-in-progress: true

jobs:
  compatibility:
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    runs-on: ubuntu24.04-16cores-64GB # ghv-ignore!
    defaults:
      run:
        working-directory: ${{ github.event_name == 'workflow_call' && inputs.working-directory || github.event.inputs.working-directory }}
    environment: "integration"
    env:
      STRIP_IMAGE_SUFFIX: ${{ github.event_name == 'workflow_call' && inputs.strip-image-suffix || github.event.inputs.strip-image-suffix }}
      BUILD_CMD: ${{ github.event_name == 'workflow_call' && inputs.buildcmd || github.event.inputs.buildcmd }}
      ENV_CMD: ${{ github.event_name == 'workflow_call' && inputs.envcmd || github.event.inputs.envcmd }}
      TEST_CMD: ${{ github.event_name == 'workflow_call' && inputs.testcmd || github.event.inputs.testcmd }}
      NODES: ${{ github.event_name == 'workflow_call' && inputs.nodes || github.event.inputs.nodes }}
      NODE_NAME_TEMPLATE: ${{ github.event_name == 'workflow_call' && inputs.node-name-template || github.event.inputs.node-name-template }}
      VERSIONS_BACK: ${{ github.event_name == 'workflow_call' && inputs.versions-back || github.event.inputs.versions-back }}
      WORKING_DIR: ${{ github.event_name == 'workflow_call' && inputs.working-directory || github.event.inputs.working-directory }}
      LOGS_DIR: ${{ github.event_name == 'workflow_call' && inputs.logs-directory || github.event.inputs.logs-directory }}
      CTF_LOG_LEVEL: ${{ github.event_name == 'workflow_call' && inputs.ctf-log-level || github.event.inputs.ctf-log-level }}
      # JD is required by the local CRE-based tests
      CTF_JD_IMAGE: "${{ secrets.AWS_ACCOUNT_ID_PROD }}.dkr.ecr.${{ secrets.QA_AWS_REGION }}.amazonaws.com/job-distributor:0.22.1"
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref || '' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Install Just
        uses: extractions/setup-just@e33e0265a09d6d736e2ee1e0eb685ef1de4669ff # v3
        with:
          just-version: "1.40.0"

      # We need to login to ECR to allow the test to pull the Job Distributor (main) and Chainlink (sdlc) images
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@010d0da01d0b5a38af31e9c3470dbfdabdecca3a # v4.0.1
        with:
          aws-region: ${{ secrets.QA_AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_CTF_READ_ACCESS_ROLE_ARN }}
          role-duration-seconds: 1800
          mask-aws-account-id: true

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076 # v2.0.1
        with:
          registries: ${{ format('{0},{1}', secrets.QA_AWS_ACCOUNT_NUMBER, secrets.AWS_ACCOUNT_ID_PROD) }}
        env:
          AWS_REGION: ${{ secrets.QA_AWS_REGION }}

      - name: Set up Go
        uses: actions/setup-go@v6 # v6
        with:
          cache: true
          go-version-file: ${{ env.WORKING_DIR }}/go.mod
          cache-dependency-path: ${{ env.WORKING_DIR }}/go.sum

      - name: Download Go dependencies
        run: |
          go mod download
        working-directory: ${{ env.WORKING_DIR }}

      - name: Get CTF version from go.mod
        shell: bash
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          CTF_VERSION=$(go list -m -json "github.com/smartcontractkit/chainlink-testing-framework/framework" | jq -r .Version)
          echo "CTF_TAG=framework/$CTF_VERSION" >> $GITHUB_ENV

      - name: Install CTF binary
        shell: bash
        working-directory: ${{ env.WORKING_DIR }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p bin
          gh release download "${{ env.CTF_TAG }}" --pattern "framework-v*-linux-amd64.tar.gz" --clobber --repo smartcontractkit/chainlink-testing-framework -O ctf.tar.gz
          tar -xzf ctf.tar.gz
          mv ctf bin/ctf
          chmod +x bin/ctf
      - name: Run compat test
        working-directory: ${{ env.WORKING_DIR }}
        shell: bash
        env:
          CTF_LOG_LEVEL: ${{ env.CTF_LOG_LEVEL }}
          FAKE_SERVER_IMAGE: ${{ secrets.FAKE_SERVER_IMAGE }}
          REGISTRY: ${{ secrets.REGISTRY_SDLC }}/chainlink
          STRIP_IMAGE_SUFFIX: ${{ env.STRIP_IMAGE_SUFFIX }}
          BUILD_CMD: ${{ env.BUILD_CMD }}
          ENV_CMD: ${{ env.ENV_CMD }}
          TEST_CMD: ${{ env.TEST_CMD }}
          NODES: ${{ env.NODES }}
          VERSIONS_BACK: ${{ env.VERSIONS_BACK }}
        run: |
          ./bin/ctf compat backward \
            --registry "${REGISTRY}" \
            --buildcmd "${BUILD_CMD}" \
            --envcmd "${ENV_CMD}" \
            --testcmd "${TEST_CMD}" \
            --nodes "${NODES}" \
            --node-name-template "${NODE_NAME_TEMPLATE}" \
            --strip-image-suffix "${STRIP_IMAGE_SUFFIX}" \
            --versions-back "${VERSIONS_BACK}"

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: container-logs-smoke
          path: ${{ env.LOGS_DIR }}
          retention-days: 3
